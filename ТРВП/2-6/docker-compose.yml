services:
  back-go-nginx:
    build: ./back-go-nginx

  nginx2:
    image: nginx:latest

    ports:
      - "443:443"

    volumes:
      - ./front-nginx:/usr/share/nginx/html:ro
      - ./nginx/nginx.conf:/etc/nginx/conf.d/default.conf:ro
      - ./cert-and-key:/etc/nginx/certs:ro

    depends_on:
      - back-go-nginx